services:
  minisearch:
    build: .
    container_name: minisearch
    restart: unless-stopped
    ports:
      - "8888:8000"   # REST API + MCP SSE (mounted at /mcp/sse)
    environment:
      # Kiwix
      KIWIX_URL: "http://kiwix:8080"
      # FreshRSS
      FRESHRSS_URL: "http://freshrss"
      FRESHRSS_USER: ""
      FRESHRSS_API_PASSWORD: ""
      FRESHRSS_MAX_ARTICLES: "10"
      # SearXNG
      SEARXNG_URL: "http://searxng:8080"
      # Home Assistant
      HA_URL: ""
      HA_TOKEN: ""
      # Uptime Kuma
      UPTIME_KUMA_URL: ""
      UPTIME_KUMA_USERNAME: ""
      UPTIME_KUMA_PASSWORD: ""
      # Ollama (for LLM-assisted Kiwix book selection)
      LLM_URL: "http://192.168.3.162:11434"
      LLM_MODEL: "qwen3:8b"
      LLM_API_TYPE: "ollama"  # "ollama" or "openai" (llama-server, LM Studio, etc.)
      # Open-Meteo
      FORECAST_LATITUDE: "35.1894"
      FORECAST_LONGITUDE: "-114.0530"
      FORECAST_LOCATION_NAME: "Kingman, Arizona"
      FORECAST_TIMEZONE: "America/Phoenix"
    volumes:
      - minisearch_data:/app/data
    networks:
      - ai-net

volumes:
  minisearch_data:

networks:
  ai-net:
    external: true
